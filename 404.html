<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Liberia Census Explorer</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <meta name="theme-color" content="#faf8f3" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#14120e" media="(prefers-color-scheme: dark)" />
  <style>
    /* Self-contained so the page renders correctly no matter what path it is
       served at (relative asset URLs would break on deep missing paths). */
    :root {
      --bg: #faf8f3; --surface: #fff; --ink: #14171f; --soft: #4a5061;
      --muted: #6b7280; --rule: #ece5d3; --accent: #a16939;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #14120e; --surface: #1c1a15; --ink: #f4efe6; --soft: #cfc6b6;
        --muted: #9c9486; --rule: #34302a; --accent: #d49a68; }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      background:
        radial-gradient(900px 460px at 100% -10%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 60%),
        var(--bg);
      color: var(--ink);
      display: grid; place-items: center; padding: 24px; text-align: center;
    }
    .card { max-width: 520px; }
    .flag {
      width: 88px; height: 46px; margin: 0 auto 26px; border-radius: 9px;
      overflow: hidden; box-shadow: 0 10px 28px rgba(20,23,31,0.18);
      border: 1px solid rgba(20,23,31,0.14);
    }
    .flag svg { display: block; width: 100%; height: 100%; }
    .code { font-size: clamp(72px, 18vw, 132px); font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
    h1 { margin: 8px 0 0; font-size: clamp(1.4rem, 4vw, 1.9rem); letter-spacing: -0.02em; }
    p { margin: 14px 0 26px; color: var(--muted); font-size: 1.05rem; line-height: 1.6; }
    .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    a.btn {
      text-decoration: none; font-weight: 600; font-size: 0.95rem;
      padding: 11px 20px; border-radius: 9px; border: 1px solid var(--rule);
    }
    a.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    a.ghost { color: var(--ink); background: var(--surface); }
    a.ghost:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <main class="card">
    <div class="flag">
      <svg viewBox="0 0 190 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-label="Flag of Liberia" role="img">
        <rect width="190" height="100" fill="#BF0A30"/>
        <g fill="#ffffff">
          <rect y="9.0909" width="190" height="9.0909"/><rect y="27.2727" width="190" height="9.0909"/>
          <rect y="45.4545" width="190" height="9.0909"/><rect y="63.6364" width="190" height="9.0909"/>
          <rect y="81.8182" width="190" height="9.0909"/>
        </g>
        <rect width="45.4545" height="45.4545" fill="#002868"/>
        <polygon fill="#ffffff" points="22.7,7.7 26.227,17.846 36.966,18.065 28.406,24.554 31.517,34.835 22.7,28.7 13.883,34.835 16.994,24.554 8.434,18.065 19.173,17.846"/>
      </svg>
    </div>
    <div class="code">404</div>
    <h1>This page wandered off the map</h1>
    <p>The page you're looking for doesn't exist. Let's get you back to the census data.</p>
    <div class="actions">
      <a class="btn primary" href="/index.html">Back to Explorer</a>
      <a class="btn ghost" href="/about.html">About</a>
      <a class="btn ghost" href="/contact.html">Contact</a>
    </div>
  </main>
</body>
</html>
