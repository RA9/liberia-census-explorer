<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    color: #14171f;
    background:
      radial-gradient(900px 500px at 100% 0%, rgba(161,105,57,0.16), transparent 60%),
      linear-gradient(180deg, #fbf9f4, #f3efe6);
    padding: 70px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .top { display: flex; align-items: center; gap: 22px; }
  .flag {
    width: 132px; height: 70px; border-radius: 12px;
    overflow: hidden; box-shadow: 0 10px 30px rgba(20,23,31,0.18);
    border: 1px solid rgba(20,23,31,0.12);
  }
  .flag svg { display: block; width: 100%; height: 100%; }
  .kicker { font-size: 26px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: #a16939; }
  h1 { font-size: 88px; line-height: 1.0; letter-spacing: -0.03em; font-weight: 800; margin-top: 26px; }
  .tagline { font-size: 33px; color: #4a5061; margin-top: 22px; max-width: 920px; line-height: 1.3; }
  .badges { display: flex; gap: 14px; margin-top: 30px; flex-wrap: wrap; }
  .badge { font-size: 24px; font-weight: 600; padding: 10px 20px; border-radius: 999px;
    background: #ece5d3; color: #4a5061; }
  .badge.b-info { background: #dde6f4; color: #1f3a66; }
  .badge.b-ok { background: #dbece2; color: #155b40; }
  .bottom { display: flex; align-items: flex-end; justify-content: space-between; }
  .url { font-size: 26px; color: #6b7280; font-weight: 600; }
  .chart { position: absolute; right: 70px; bottom: 150px; width: 380px; height: 220px; opacity: 0.95; }
</style>
</head>
<body>
  <div class="top">
    <span class="flag">
      <svg viewBox="0 0 190 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="190" height="100" fill="#BF0A30"/>
        <g fill="#ffffff">
          <rect y="9.0909" width="190" height="9.0909"/><rect y="27.2727" width="190" height="9.0909"/>
          <rect y="45.4545" width="190" height="9.0909"/><rect y="63.6364" width="190" height="9.0909"/>
          <rect y="81.8182" width="190" height="9.0909"/>
        </g>
        <rect width="45.4545" height="45.4545" fill="#002868"/>
        <polygon fill="#ffffff" points="22.7,7.7 26.227,17.846 36.966,18.065 28.406,24.554 31.517,34.835 22.7,28.7 13.883,34.835 16.994,24.554 8.434,18.065 19.173,17.846"/>
      </svg>
    </span>
    <span class="kicker" id="kicker">Census · 1962 – 2022</span>
  </div>

  <svg class="chart" viewBox="0 0 380 220">
    <g stroke="#ece5d3" stroke-width="1">
      <line x1="0" y1="40" x2="380" y2="40"/><line x1="0" y1="100" x2="380" y2="100"/><line x1="0" y1="160" x2="380" y2="160"/>
    </g>
    <path d="M0,190 L80,150 L160,120 L260,60 L380,20" fill="none" stroke="#a16939" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M0,190 L80,150 L160,120 L260,60 L380,20 L380,220 L0,220 Z" fill="#a16939" fill-opacity="0.12"/>
    <g fill="#a16939"><circle cx="0" cy="190" r="6"/><circle cx="80" cy="150" r="6"/><circle cx="160" cy="120" r="6"/><circle cx="260" cy="60" r="6"/><circle cx="380" cy="20" r="6"/></g>
    <path d="M260,60 L380,-6" fill="none" stroke="#3a5b8c" stroke-width="5" stroke-dasharray="8 8" stroke-linecap="round"/>
  </svg>

  <div>
    <h1 id="title">Liberia Census Explorer</h1>
    <p class="tagline" id="tagline">Query the census &amp; forecast future population — by county, sex and age.</p>
    <div class="badges" id="badges"></div>
  </div>

  <div class="bottom">
    <span class="url">Built with tan-compose · open data</span>
  </div>

  <script>
    const VARIANTS = {
      home: {
        kicker: "Census · 1962 – 2022",
        title: "Liberia Census Explorer",
        tagline: "Query the census & forecast future population — by county, sex and age.",
        badges: [["5 censuses","b-info"],["15 counties","b-ok"],["Population pyramids",""]],
      },
      about: {
        kicker: "About the project",
        title: "About this project",
        tagline: "The census data, the forecast models, and the limitations — explained.",
        badges: [["Growth-rate","b-info"],["Linear","b-ok"],["Exponential",""]],
      },
      contact: {
        kicker: "Contact",
        title: "Get in touch",
        tagline: "Questions, data corrections, or collaboration — reach the team.",
        badges: [["smartliberiadevteam@gmail.com","b-info"],["Monrovia, Liberia","b-ok"]],
      },
    };
    const v = new URLSearchParams(location.search).get("v") || "home";
    const cfg = VARIANTS[v] || VARIANTS.home;
    document.getElementById("kicker").textContent = cfg.kicker;
    document.getElementById("title").textContent = cfg.title;
    document.getElementById("tagline").textContent = cfg.tagline;
    document.getElementById("badges").innerHTML = cfg.badges
      .map(([t, c]) => `<span class="badge ${c}">${t}</span>`).join("");
  </script>
</body>
</html>
